name: Get Citation Data

on:
  workflow_dispatch:
  schedule:
    # 每天北京时间 16:00，UTC 08:00
    - cron: "0 8 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          cd ./google_scholar_crawler
          pip install -r requirements.txt

      - name: Run Google Scholar crawler
        run: |
          cd ./google_scholar_crawler
          python main.py
        env:
          GOOGLE_SCHOLAR_ID: worq2P0AAAAJ

      - name: Push citation data to google-scholar-stats branch
        run: |
          cd ./google_scholar_crawler/results
          git init
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add *.json
          git commit -m "Updated Citation Data"
          git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:google-scholar-stats --force
